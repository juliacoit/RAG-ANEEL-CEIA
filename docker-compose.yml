services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_aneel
    ports:
      - "6333:6333"   # API REST (usada pelo Python)
      - "6334:6334"   # gRPC (opcional)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
    external: true
    name: rag-aneel-ceia-giovanna-branch_qdrant_storage
